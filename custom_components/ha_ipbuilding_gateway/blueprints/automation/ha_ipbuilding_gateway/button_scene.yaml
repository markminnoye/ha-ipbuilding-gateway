# ipbuilding_blueprint_version: 4
blueprint:
  name: IPBuilding wandknop — scene
  description: >
    **Blueprint-versie: 4.** Scene activation for an IPBuilding
    IP1100PoE wall switch. Use this
    when a short press (and optionally a long press) should activate
    Home Assistant scenes — no lights or switches to toggle.

    The gateway classifies the press itself: a short tap emits
    `single_press` on release, a hold emits `long_press` at the
    threshold. v4 hooks into both events directly — no timing logic.

    For mixed targets (lamp + scene, area-wide on/off) use
    `button_standard`.

    Import via Instellingen → Automatiseringen & scènes → Blueprints →
    Blueprint importeren, then paste the GitHub URL from the README.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_scene.yaml

  input:
    button_entity:
      name: Knop
      description: >
        De IPBuilding event-entity van de fysieke wandknop
        (bv. `event.2f8185190000df`). De entity moet ingeschakeld zijn
        in Instellingen → Apparaten & entiteiten.
      selector:
        entity:
          filter:
            - domain: event
              integration: ha_ipbuilding_gateway

    press_scene:
      name: Scene (korte druk)
      description: Scene die wordt geactiveerd bij een korte druk.
      selector:
        entity:
          domain: scene
          multiple: false

    long_press_scene:
      name: Scene (lang indrukken, optioneel)
      description: >
        Scene bij lang indrukken (gateway-hold, standaard 1,5 s).
        Laat leeg als lang indrukken niets moet doen.
      default: ""
      selector:
        entity:
          domain: scene
          multiple: false

mode: single

variables:
  long_press_scene: !input long_press_scene

trigger:
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: single_press
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: long_press

action:
  - choose:
      - conditions:
          - condition: trigger
            id: single_press
        sequence:
          - action: scene.turn_on
            target:
              entity_id: !input press_scene

      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ long_press_scene | length > 0 }}"
        sequence:
          - action: scene.turn_on
            target:
              entity_id: !input long_press_scene
