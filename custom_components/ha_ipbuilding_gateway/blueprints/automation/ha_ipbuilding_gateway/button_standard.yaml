blueprint:
  name: IPBuilding wandknop
  description: >
    **Blueprint-versie: 11.** Actie-slots voor één IP1100PoE-wandknop,
    gelabeld naar Matter-semantiek: korte druk, multi-press (optioneel),
    lange druk en loslaten na lange druk. Laat een slot leeg om dat
    gebaar te negeren.

    **Multi-press** (dubbel/driedubbel) staat standaard ingeklapt en
    werkt alleen als de gateway add-on *Dubbel- en driedubbelklik* aan
    staat (Configuratie → Installatie). Zonder die optie blijven korte
    druk, lange druk en loslaten gewoon werken.

    **Dimmen?** Gebruik liever het blueprint *IPBuilding wandknop —
    dimmen* (`button_dim`, native hold-to-dim). Wil je zelf services
    kiezen, vul hier `light.toggle`, `ha_ipbuilding_gateway.dim_start`
    en `ha_ipbuilding_gateway.dim_stop` in.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_standard.yaml
  homeassistant:
    min_version: "2024.6.0"

  input:
    common_section:
      name: Algemeen
      icon: mdi:cog-outline
      input:
        button_entity:
          name: Knop
          description: >
            De IPBuilding event-entity van de fysieke wandknop
            (bv. `event.2f8185190000df`). De entity moet ingeschakeld
            zijn in Instellingen → Apparaten & entiteiten.
          selector:
            entity:
              filter:
                - domain: event
                  integration: ha_ipbuilding_gateway

    press_section:
      name: Korte druk (`press_end`)
      icon: mdi:gesture-tap-button
      input:
        press_action:
          name: Actie bij korte druk
          description: Eén of meer acties op een korte tik (single_press / press_end).
          default: []
          selector:
            action:

    multi_press_section:
      name: Multi-press (`multi_press_end`)
      icon: mdi:gesture-double-tap
      description: >
        Dubbele en driedubbele druk werken alleen als de gateway add-on
        multi-press herkent: Instellingen → Add-ons → IPBuilding Gateway →
        Configuratie → Installatie → *Dubbel- en driedubbelklik* aan.
        Herstart de add-on na wijziging. Met multi-press aan wacht de
        gateway na elke klik kort (~350 ms, *Multi-press venster*) —
        de actie bij een korte druk start daarom met die vertraging.
      collapsed: true
      input:
        double_action:
          name: Actie bij dubbele druk
          description: Eén of meer acties op een dubbele druk (double_press / multi_press_end).
          default: []
          selector:
            action:
        triple_action:
          name: Actie bij driedubbele druk
          description: Eén of meer acties op een driedubbele druk (triple_press / multi_press_end).
          default: []
          selector:
            action:

    long_press_section:
      name: Lange druk (`long_press_start`)
      icon: mdi:gesture-tap-hold
      input:
        long_press_action:
          name: Actie bij lange druk
          description: >
            Eén of meer acties terwijl de knop wordt vastgehouden
            (long_press / long_press_start).
          default: []
          selector:
            action:

    release_section:
      name: Loslaten na lange druk (`long_release`)
      icon: mdi:gesture-tap
      input:
        release_action:
          name: Actie bij loslaten na lange druk
          description: >
            Actie die alleen vuurt op de release die een lange druk
            afsluit (long_release). Laat leeg als je geen loslaat-actie wilt.
          default: []
          selector:
            action:

mode: queued

trigger:
  # The gateway classifies the press: single_press fires on the release
  # of a short tap, long_press fires at the hold threshold while the
  # button is still held, release fires when the button is released.
  # double_press / triple_press require the add-on multi_press option.
  # single_press and long_press are mutually exclusive; release fires
  # after either, but the action block scopes it to long_press only
  # via the `from: "long_press"` guard.
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: short
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "double_press"
    not_from:
      - unavailable
      - unknown
    id: double
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "triple_press"
    not_from:
      - unavailable
      - unknown
    id: triple
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: long
  - platform: state
    entity_id: !input button_entity
    # Only a release that ends a hold (long_press → release) fires here.
    # A short-tap release (single_press → release) does NOT match, so the
    # trailing release of a brief tap cannot reach the release branch.
    attribute: event_type
    from: "long_press"
    to: "release"
    id: release

action:
  - choose:
      - conditions:
          - condition: trigger
            id: double
        sequence: !input double_action
      - conditions:
          - condition: trigger
            id: triple
        sequence: !input triple_action
      - conditions:
          - condition: trigger
            id: long
        sequence: !input long_press_action
      - conditions:
          - condition: trigger
            id: release
        sequence: !input release_action
    default: !input press_action

# ipbuilding_blueprint_version: 11
