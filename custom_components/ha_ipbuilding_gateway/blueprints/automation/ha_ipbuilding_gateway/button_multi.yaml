# ipbuilding_blueprint_version: 3
blueprint:
  name: IPBuilding wandknop — enkel/dubbel/lang
  description: >
    **Blueprint-versie: 3.** Maps single, double, triple and long press of
    an IPBuilding IP1100PoE wall button to separate action sequences.

    Zet in de gateway add-on Configuration de optie **multi_press** aan.
    Zolang die uit staat, komen er geen double/triple events. Aan zetten
    vertraagt de enkele druk met ~350 ms (add-on window). Leave any action
    empty to ignore that gesture.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_multi.yaml
  input:
    button_entity:
      name: Knop
      selector:
        entity:
          filter:
            - domain: event
              integration: ha_ipbuilding_gateway
    single_action:
      name: Actie bij enkele druk
      default: []
      selector:
        action:
    double_action:
      name: Actie bij dubbele druk
      default: []
      selector:
        action:
    triple_action:
      name: Actie bij driedubbele druk
      default: []
      selector:
        action:
    long_action:
      name: Actie bij lange druk
      default: []
      selector:
        action:

mode: single

trigger:
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from: [unavailable, unknown]
    id: single
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "double_press"
    not_from: [unavailable, unknown]
    id: double
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "triple_press"
    not_from: [unavailable, unknown]
    id: triple
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from: [unavailable, unknown]
    id: long

action:
  - choose:
      - conditions: [{condition: trigger, id: single}]
        sequence: !input single_action
      - conditions: [{condition: trigger, id: double}]
        sequence: !input double_action
      - conditions: [{condition: trigger, id: triple}]
        sequence: !input triple_action
      - conditions: [{condition: trigger, id: long}]
        sequence: !input long_action
